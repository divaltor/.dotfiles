---
# ============================================================
# LXC: smb (101) — Samba file server + Avahi mDNS
# ============================================================
# The container runs Debian with Samba sharing ZFS-backed
# storage from the Proxmox host via bind mount (/mnt/share).
# ============================================================

- import_playbook: lxc_bootstrap.yml
  vars:
    lxc_bootstrap_targets:
      - smb

- name: Configure Samba LXC
  hosts: smb
  gather_facts: true
  vars_files:
    - ../group_vars/all.yml

  roles:
    - ssh
    - common
    - tailscale
    - role: samba
    - role: avahi
      vars:
        avahi_samba_advertise: true
