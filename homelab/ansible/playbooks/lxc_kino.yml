---
# ============================================================
# LXC: kino (102) — Plex media server + Avahi mDNS
# ============================================================
# The container runs Debian with Plex reading ZFS-backed media
# from the Proxmox host via bind mounts (/media/films, /media/shows).
# ============================================================

- import_playbook: lxc_bootstrap.yml
  vars:
    lxc_bootstrap_targets:
      - kino

- name: Configure Plex LXC
  hosts: kino
  gather_facts: true
  vars_files:
    - ../group_vars/all.yml

  roles:
    - ssh
    - common
    - tailscale
    - plex
    - role: caddy_proxy
      vars:
        caddy_proxy_server_name: kino.local
        caddy_proxy_upstream: http://127.0.0.1:32400
        caddy_proxy_redirect_root_to: /web
    - avahi
