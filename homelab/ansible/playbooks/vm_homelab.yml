---
# ============================================================
# VM: homelab (100) — Debian 13
# ============================================================

- name: Configure homelab VM
  hosts: homelab
  gather_facts: true
  vars_files:
    - ../group_vars/all.yml

  roles:
    - ssh
    - common
    - tailscale
    - role: avahi
      vars:
        avahi_allow_interfaces: ens18

  tasks:
    - name: Install AMD GPU firmware
      ansible.builtin.package:
        name: firmware-amd-graphics
        state: present
