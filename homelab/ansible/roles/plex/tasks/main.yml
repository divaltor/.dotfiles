---
# Plex role — install Plex Media Server from the official APT repository.

- name: Install Plex APT prerequisites
  ansible.builtin.package:
    name:
      - apt-transport-https
    state: present

- name: Add Plex APT signing key
  ansible.builtin.get_url:
    url: https://downloads.plex.tv/plex-keys/PlexSign.key
    dest: /usr/share/keyrings/plexmediaserver.asc
    owner: root
    group: root
    mode: "0644"

- name: Add Plex APT repository
  ansible.builtin.deb822_repository:
    name: plexmediaserver
    types: deb
    uris: https://downloads.plex.tv/repo/deb
    suites: public
    components: main
    signed_by: /usr/share/keyrings/plexmediaserver.asc
    state: present
  register: plex_apt_repository

- name: Update APT cache after adding Plex repository
  ansible.builtin.apt:
    update_cache: true
  when: plex_apt_repository is changed

- name: Install Plex Media Server
  ansible.builtin.package:
    name: plexmediaserver
    state: present

- name: Ensure Plex Media Server is running
  ansible.builtin.service:
    name: plexmediaserver
    state: started
    enabled: true
