---
# Plex role — install Plex Media Server from the official APT repository.

- name: Install Plex APT prerequisites
  ansible.builtin.package:
    name:
      - apt-transport-https
    state: present

- name: Ensure APT keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Add Plex APT signing key
  ansible.builtin.get_url:
    url: https://downloads.plex.tv/plex-keys/PlexSign.v2.key
    dest: /etc/apt/keyrings/plexmediaserver.v2.asc
    owner: root
    group: root
    mode: "0644"

- name: Add Plex APT repository
  ansible.builtin.deb822_repository:
    name: plexmediaserver
    types: deb
    uris: https://repo.plex.tv/deb/
    suites: public
    components: main
    signed_by: /etc/apt/keyrings/plexmediaserver.v2.asc
    state: present
  register: plex_apt_repository

- name: Update APT cache after adding Plex repository
  ansible.builtin.apt:
    update_cache: true
  when: plex_apt_repository is changed

- name: Install Plex Media Server
  ansible.builtin.package:
    name: plexmediaserver
    state: present

- name: Ensure Plex Media Server is running
  ansible.builtin.service:
    name: plexmediaserver
    state: started
    enabled: true
