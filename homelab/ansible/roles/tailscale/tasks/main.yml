---
# Tailscale role — install and join tailnet non-interactively

- name: Install Tailscale repository prerequisites
  ansible.builtin.package:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present

- name: Install Tailscale apt keyring
  ansible.builtin.get_url:
    url: "https://pkgs.tailscale.com/stable/{{ tailscale_apt_distribution }}/{{ tailscale_apt_release }}.noarmor.gpg"
    dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
    owner: root
    group: root
    mode: "0644"

- name: Install Tailscale apt source
  ansible.builtin.get_url:
    url: "https://pkgs.tailscale.com/stable/{{ tailscale_apt_distribution }}/{{ tailscale_apt_release }}.tailscale-keyring.list"
    dest: /etc/apt/sources.list.d/tailscale.list
    owner: root
    group: root
    mode: "0644"
  register: tailscale_apt_source

- name: Update apt cache after adding Tailscale source
  ansible.builtin.apt:
    update_cache: true
  when: tailscale_apt_source.changed

- name: Install Tailscale
  ansible.builtin.package:
    name: tailscale
    state: present

- name: Ensure tailscaled is running
  ansible.builtin.service:
    name: tailscaled
    state: started
    enabled: true

- name: Read Tailscale status
  ansible.builtin.command: tailscale status --json
  register: tailscale_status
  changed_when: false
  failed_when: false

- name: Determine whether Tailscale needs login
  ansible.builtin.set_fact:
    tailscale_needs_login: "{{ tailscale_status.rc != 0 or (tailscale_status.stdout | from_json).BackendState == 'NeedsLogin' }}"

- name: Require Tailscale auth key for first login
  ansible.builtin.assert:
    that:
      - tailscale_auth_key | length > 0
    fail_msg: "Tailscale auth key is not set; provide TAILSCALE_AUTH_KEY or TF_VAR_tailscale_auth_key via 1Password"
  when: tailscale_needs_login
  no_log: true

- name: Join Tailscale tailnet
  ansible.builtin.command:
    argv: "{{ ['tailscale', 'up', '--auth-key=' ~ tailscale_auth_key, '--hostname=' ~ tailscale_hostname] + tailscale_up_args }}"
  when: tailscale_needs_login
  no_log: true
