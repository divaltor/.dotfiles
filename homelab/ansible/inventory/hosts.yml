---
# Ansible inventory — Proxmox infrastructure on divaltor-dc
# Hosts default to Avahi mDNS records. Override *_ansible_host vars with
# temporary IPs during first bootstrap before Avahi is installed.

all:
  hosts:
    proxmox_host:
      ansible_host: "{{ proxmox_ansible_host | default('proxmox.local') }}"
      ansible_user: root
  children:
    vms:
      hosts:
        homelab:
          ansible_host: "{{ homelab_ansible_host | default('homelab.local') }}"
          ansible_user: root
    containers:
      hosts:
        smb:
          ansible_host: "{{ smb_ansible_host | default('smb.local') }}"
          ansible_user: root
          lxc_vmid: 101
        kino:
          ansible_host: "{{ kino_ansible_host | default('kino.local') }}"
          ansible_user: root
          lxc_vmid: 102
        qbittorrent:
          ansible_host: "{{ qbittorrent_ansible_host | default('qbittorrent.local') }}"
          ansible_user: root
          lxc_vmid: 103
